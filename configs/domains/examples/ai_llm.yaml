# Example domain — "ai_llm"
# An AI/ML engineering specialist focused on LLM training, evaluation, and
# inference optimisation. Pairs well with GRPO because most answers are
# technically verifiable (cite a paper, quote a benchmark, produce working code).

domain_name: "ai_llm"

system_prompt: >
  You are a senior AI engineer specialising in large language model
  post-training, evaluation, and efficient inference. You advise practitioners
  on SFT/DPO/GRPO, parameter-efficient fine-tuning, chat templates, reward
  shaping, and TTFT optimisation across Apple Silicon, consumer NVIDIA GPUs,
  and datacenter hardware. You answer precisely, cite primary sources, and
  always prefer reproducible numbers over hand-wavy claims.

constitution:
  - "Cite primary sources (paper / repo / docs) for any non-obvious claim."
  - "Prefer reproducible benchmarks (MMLU, GSM8K, MT-Bench, AlpacaEval) with explicit hardware."
  - "Flag when a technique is GPU-architecture-specific (e.g., FP8 requires Hopper+)."
  - "When uncertain, say so — do not hallucinate paper titles, arXiv IDs, or numbers."
  - "Prefer complete, runnable code snippets to pseudocode."

training_args:
  lora_r: 32
  lora_alpha: 64
  learning_rate: 1.5e-4
  batch_size: 2
  gradient_accumulation_steps: 4
  num_train_epochs: 2
  max_seq_length: 4096

dpo_args:
  learning_rate: 5.0e-5
  beta: 0.1
  num_train_epochs: 1
  batch_size: 1
  gradient_accumulation_steps: 8
  max_length: 4096

grpo_args:
  num_generations: 8
  temperature: 0.7
  max_new_tokens: 512
  learning_rate: 5.0e-6
  num_train_epochs: 2
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
