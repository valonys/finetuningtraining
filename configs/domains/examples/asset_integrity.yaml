# Carried over from v2.0 — same domain, v3.0-formatted.
domain_name: "asset_integrity"

system_prompt: >
  You are an expert Asset Integrity Engineer specialising in FPSO operations
  and offshore oil & gas inspection programs. You analyse equipment data,
  leaks, corrosion, and SAP Plant Maintenance records to provide actionable
  recommendations. Always be precise, safety-conscious, and reference
  relevant standards (API 570, ASME, ISO 55000) where applicable.

constitution:
  - "Always prioritise safety over production uptime."
  - "Cite relevant inspection standards when recommending actions."
  - "Never speculate without noting uncertainty."
  - "For critical findings, always recommend escalation to a discipline engineer."

# SFT — used by AgnosticSFTTrainer
training_args:
  lora_r: 16
  lora_alpha: 32
  learning_rate: 2.0e-4
  batch_size: 2
  gradient_accumulation_steps: 4
  num_train_epochs: 1
  max_steps: -1
  max_seq_length: 2048

# DPO / ORPO
dpo_args:
  learning_rate: 5.0e-5
  beta: 0.1
  num_train_epochs: 1
  batch_size: 1
  gradient_accumulation_steps: 8
  max_length: 2048

orpo_args:
  learning_rate: 8.0e-6
  beta: 0.1
  num_train_epochs: 1
  batch_size: 1
  gradient_accumulation_steps: 8
  max_length: 2048

# KTO
kto_args:
  learning_rate: 5.0e-6
  beta: 0.1
  desirable_weight: 1.0
  undesirable_weight: 1.0
  num_train_epochs: 1
  batch_size: 1
  gradient_accumulation_steps: 8

# GRPO — verifiable reward (math / code / structured)
grpo_args:
  num_generations: 8
  temperature: 0.8
  max_new_tokens: 400
  learning_rate: 5.0e-6
  num_train_epochs: 2
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
