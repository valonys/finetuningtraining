# docker compose up              → GPU-enabled (needs nvidia-container-toolkit)
# docker compose --profile cpu up → CPU-only fallback

services:
  studio:
    build:
      context: .
      dockerfile: Dockerfile
      target: default          # CUDA runtime
    ports:
      - "8000:8000"
    environment:
      - VALONY_BASE_MODEL=${VALONY_BASE_MODEL:-Qwen/Qwen2.5-7B-Instruct}
      - VALONY_INFERENCE_BACKEND=${VALONY_INFERENCE_BACKEND:-vllm}
      - VALONY_PREWARM_INFERENCE=1
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-nemotron}
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./configs/domains:/app/configs/domains
      - hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # CPU-only variant for local dev on Mac/Intel or CI.
  # Activate with: docker compose --profile cpu up
  studio-cpu:
    build:
      context: .
      dockerfile: Dockerfile
      target: cpu
    profiles:
      - cpu
    ports:
      - "8000:8000"
    environment:
      - VALONY_BASE_MODEL=${VALONY_BASE_MODEL:-Qwen/Qwen2.5-0.5B-Instruct}
      - VALONY_INFERENCE_BACKEND=hf
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./configs/domains:/app/configs/domains
      - hf-cache:/root/.cache/huggingface
    restart: unless-stopped

volumes:
  hf-cache:
