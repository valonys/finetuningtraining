name: CI

# Run on every push and pull request. Executes every no-GPU test under
# `tests/` — the test suite includes template routing, hardware
# detection, Data Forge chunker, provider URL/auth resolution, and the
# DPO pair-synthesis fallback behaviour. All tests mock out network
# and heavy deps so the runner stays slim.

on:
  push:
    branches: ["**"]
    tags-ignore: ["**"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-tests:
    name: Smoke tests (no GPU)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install minimal dependencies
        # The test deps live in requirements-test.txt so adding a new
        # module with a new dep never breaks CI again — update the file
        # once, CI + local dev stay in sync.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run all no-GPU tests
        run: pytest tests/ -v

      - name: Aggregate summary
        if: always()
        run: |
          echo "## Smoke test summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Python: ${{ matrix.python-version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Runner: ubuntu-latest" >> "$GITHUB_STEP_SUMMARY"
          echo "- Scope: tests/ (templates, hardware, chunker, providers, pair synth, uploads, RAG)" >> "$GITHUB_STEP_SUMMARY"
