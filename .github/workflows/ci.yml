name: CI

# Run on every push and pull request. Executes every no-GPU test under
# `tests/` — the test suite includes template routing, hardware
# detection, Data Forge chunker, provider URL/auth resolution, and the
# DPO pair-synthesis fallback behaviour. All tests mock out network
# and heavy deps so the runner stays slim.

on:
  push:
    branches: ["**"]
    tags-ignore: ["**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-tests:
    name: Smoke tests (no GPU)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install minimal dependencies
        # The test deps live in requirements-test.txt so adding a new
        # module with a new dep never breaks CI again — update the file
        # once, CI + local dev stay in sync.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run all no-GPU tests
        run: pytest tests/ -v

      - name: Aggregate summary
        if: always()
        run: |
          echo "## Smoke test summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Python: ${{ matrix.python-version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Runner: ubuntu-latest" >> "$GITHUB_STEP_SUMMARY"
          echo "- Scope: tests/ (templates, hardware, chunker, providers, pair synth, uploads, RAG)" >> "$GITHUB_STEP_SUMMARY"

  frontend:
    name: Frontend lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  postgres-tests:
    name: Postgres backend (testcontainers)
    runs-on: ubuntu-latest
    # GitHub Actions ubuntu runners ship with Docker preinstalled, so
    # testcontainers can spin up real Postgres containers. This job
    # exercises app/persistence/postgres.py against the same tenant
    # isolation guarantees the SQLite path covers, but on the actual
    # production-profile driver.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test deps + Postgres extras
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
          pip install 'psycopg[binary]>=3.1' 'psycopg-pool>=3.2' 'testcontainers[postgres]>=4.7'

      - name: Run Postgres backend tests
        run: pytest tests/test_persistence_postgres.py -v

      - name: Summary
        if: always()
        run: |
          echo "## Postgres backend test summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: postgres:16-alpine via testcontainers-python" >> "$GITHUB_STEP_SUMMARY"
          echo "- Driver: psycopg3 + psycopg-pool" >> "$GITHUB_STEP_SUMMARY"
          echo "- Scope: tests/test_persistence_postgres.py (12 cases)" >> "$GITHUB_STEP_SUMMARY"
