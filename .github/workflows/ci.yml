name: CI

# Run on every push and pull request. Executes every no-GPU test under
# `tests/` — the test suite includes template routing, hardware
# detection, Data Forge chunker, provider URL/auth resolution, and the
# DPO pair-synthesis fallback behaviour. All tests mock out network
# and heavy deps so the runner stays slim.

on:
  push:
    branches: ["**"]
    tags-ignore: ["**"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-tests:
    name: Smoke tests (no GPU)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install minimal dependencies
        # Smoke tests need:
        #   pytest          — runner
        #   pytest-asyncio  — for the async save_upload tests in test_uploads.py
        #   pyyaml          — config_loader
        #   pydantic        — app.models
        #   requests        — app.providers.ollama.chat / stream_chat
        # We do NOT install torch, transformers, trl, unsloth, mlx, vllm,
        # bitsandbytes, etc. — the tests are designed to run without them.
        run: |
          python -m pip install --upgrade pip
          pip install pytest "pytest-asyncio>=0.23" pyyaml "pydantic>=2.6" requests

      - name: Run all no-GPU tests
        run: pytest tests/ -v

      - name: Aggregate summary
        if: always()
        run: |
          echo "## Smoke test summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Python: ${{ matrix.python-version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Runner: ubuntu-latest" >> "$GITHUB_STEP_SUMMARY"
          echo "- Scope: tests/ (templates, hardware, chunker, providers, pair synth)" >> "$GITHUB_STEP_SUMMARY"
