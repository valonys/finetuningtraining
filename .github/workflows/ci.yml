name: CI

# Run on every push and pull request. The only tests wired up are the
# three no-GPU smoke tests (template routing, hardware detection,
# data-forge chunker) — they're enough to catch import regressions and
# chat-template routing bugs without needing a GPU runner.

on:
  push:
    branches: ["**"]
    tags-ignore: ["**"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-tests:
    name: Smoke tests (no GPU)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install minimal dependencies
        # The three target tests only need pytest + pyyaml + pydantic.
        # We do NOT install torch, transformers, trl, unsloth, mlx, vllm,
        # bitsandbytes, etc. — the tests are designed to run without them.
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml "pydantic>=2.6"

      - name: Run template routing tests
        run: pytest tests/test_templates.py -v

      - name: Run hardware detection tests
        run: pytest tests/test_hardware.py -v

      - name: Run Data Forge chunker tests
        run: pytest tests/test_data_forge_chunker.py -v

      - name: Aggregate summary
        if: always()
        run: |
          echo "## Smoke test summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Python: ${{ matrix.python-version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Runner: ubuntu-latest" >> "$GITHUB_STEP_SUMMARY"
          echo "- Scope: template routing, hardware detection, data-forge chunker" >> "$GITHUB_STEP_SUMMARY"
